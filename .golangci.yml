version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - devnw.dev/mail

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - gocritic
    - gosec
    - loggercheck
    - makezero
    - nilerr
    - noctx
    - nolintlint
    - revive
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: "_test\\.go$"
        linters:
          - errcheck
          - gosec
          - bodyclose
          - noctx
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    nolintlint:
      allow-no-explanation:
        - funlen
        - gocognit
        - lll
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true

output:
  show-stats: true
